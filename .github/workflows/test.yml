name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vibeshield-ts/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        working-directory: vibeshield-ts
        
      - name: Run tests
        run: npm test
        working-directory: vibeshield-ts

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vibeshield-python/requirements-dev.txt
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
        working-directory: vibeshield-python
        
      - name: Run tests
        run: python -m pytest
        env:
          PYTHONPATH: .
        working-directory: vibeshield-python
